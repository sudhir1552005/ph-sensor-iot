<!DOCTYPE html>
<html>

<head>

<title>Smart Agro Monitoring</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
}

th,td{
border:1px solid black;
padding:10px;
}

th{
background:#4CAF50;
color:white;
}

h1{
color:#333;
}

</style>

</head>

<body>

<h1>Smart Agro Live Monitoring</h1>

<table>

<tr>
<th>Time</th>
<th>Moisture (%)</th>
<th>pH Value</th>
</tr>

{% for d in data %}

<tr>
<td>{{d.time}}</td>
<td>{{d.moisture}}</td>
<td>{{d.ph}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
